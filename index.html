<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Cupula | Archivo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --text-color: #1a1a1a; --accent-color: #000; --bg-color: #ffffff; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-sizing: border-box; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); z-index: 2000; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 600; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #f0f0f0; }
        .leaflet-tile-container { filter: grayscale(1) contrast(1.1) brightness(0.98); }
        .marker-pin { width: 18px; height: 18px; background-color: #000; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); margin: -9px 0 0 -9px; border: 1px solid #fff; }
        .leaflet-popup-content-wrapper { border-radius: 0; padding: 0; overflow: hidden; width: 300px; }
        .leaflet-popup-content { margin: 0; width: 300px !important; }
        .popup-gallery { position: relative; width: 100%; height: 180px; background: #000; display: flex; align-items: center; justify-content: center; }
        .popup-gallery img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.4s ease-in-out; opacity: 1; }
        .popup-gallery img.fading { opacity: 0; }
        .gallery-nav { position: absolute; top: 50%; width: 100%; display: flex; justify-content: space-between; padding: 0 10px; box-sizing: border-box; transform: translateY(-50%); z-index: 10; }
        .nav-arrow { background: rgba(255,255,255,0.7); border: none; width: 30px; height: 30px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .popup-info { padding: 18px; }
        .popup-info h4 { margin: 0 0 8px 0; font-family: 'Playfair Display', serif; font-size: 1.1rem; }
        .popup-info p { font-size: 0.75rem; color: #555; line-height: 1.4; }
    </style>
</head>
<body>
    <header><div class="logo">Estudio Cupula</div></header>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const projects = [
            { title: "Azcuénaga 1517", folder: "azcuenaga", year: "2024", area: "Recoleta", lat: -34.59134, lng: -58.39791, desc: "Refuncionalización integral de unidad de vivienda.", imgCount: 3 },
            { title: "Av. Pueyrredón 1975", folder: "pueyrredon", year: "2024", area: "Recoleta", lat: -34.5898, lng: -58.3965, desc: "Intervención estética en áreas comunes.", imgCount: 1 },
            { title: "José Manuel Estrada 1845", folder: "estrada", year: "2024", area: "Martínez", lat: -34.4921, lng: -58.4982, desc: "Vivienda unifamiliar moderna.", imgCount: 2 }
        ];

        const galleryState = {};
        window.changeImg = function(title, direction) {
            const project = projects.find(p => p.title === title);
            const imgElement = document.getElementById(`img-obj-${project.folder}`);
            if (!galleryState[title]) galleryState[title] = 1;
            imgElement.classList.add('fading');
            setTimeout(() => {
                let current = galleryState[title] + direction;
                if (current > project.imgCount) current = 1;
                if (current < 1) current = project.imgCount;
                galleryState[title] = current;
                // USAMOS .jpeg PORQUE ASÍ ESTÁN TUS ARCHIVOS
                imgElement.src = `assets/images/${project.folder}/${current}.jpeg`;
                imgElement.onload = () => imgElement.classList.remove('fading');
            }, 400);
        };

        const map = L.map('map', { center: [-34.58, -58.43], zoom: 12, zoomControl: false, attributionControl: false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        projects.forEach(project => {
            const markerIcon = L.divIcon({ className: 'custom-icon', html: `<div class="marker-pin"></div>`, iconSize: [20, 20], iconAnchor: [10, 10] });
            const popupContent = `
                <div class="project-popup">
                    <div class="popup-gallery">
                        <img id="img-obj-${project.folder}" src="assets/images/${project.folder}/1.jpeg" alt="${project.title}">
                        <div class="gallery-nav">
                            <button class="nav-arrow" onclick="changeImg('${project.title}', -1)">❮</button>
                            <button class="nav-arrow" onclick="changeImg('${project.title}', 1)">❯</button>
                        </div>
                    </div>
                    <div class="popup-info">
                        <h4>${project.title}</h4>
                        <p>${project.desc}</p>
                    </div>
                </div>`;
            L.marker([project.lat, project.lng], { icon: markerIcon }).addTo(map).bindPopup(popupContent);
        });
    </script>
</body>
</html>
</html>
